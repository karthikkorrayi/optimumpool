server.port=8020

# Database — localhost replaced with ${DB_HOST}, falls back to localhost for local dev
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/carpooldb?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root1234}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
server.error.include-message=always

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

# JWT
jwt.secret=${JWT_SECRET:MyOptimumPoolSuperSecretKey2024XYZ}
jwt.expiration.ms=86400000