server.port=8084

spring.data.mongodb.uri=mongodb://${MONGO_HOST:localhost}:${MONGO_PORT:27017}/
spring.data.mongodb.database=${MONGO_DB:offer_ride}

server.error.include-message=always
spring.main.allow-bean-definition-overriding=true

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

# JWT
jwt.secret=${JWT_SECRET:MyOptimumPoolSuperSecretKey2024XYZ}